<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinkar Traders - Spice Stock</title>
    <link rel="stylesheet" href="style.css"> <!-- Your CSS file -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f3e9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #d35400;
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 { margin: 0; }
        main {
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #aaa;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #e67e22;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        footer {
            text-align: center;
            padding: 15px;
            background-color: #d35400;
            color: white;
            margin-top: 40px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #e67e22;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hinkar Traders - Spice Stock</h1>
    </header>

    <main>
        <h2>Available Spices</h2>
        <table>
            <thead>
                <tr>
                    <th>Spice Name</th>
                    <th>Quantity (kg)</th>
                    <th>Price (₹ per kg)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Turmeric</td>
                    <td>50</td>
                    <td>300</td>
                </tr>
                <tr>
                    <td>Red Chili</td>
                    <td>30</td>
                    <td>400</td>
                </tr>
                <tr>
                    <td>Coriander</td>
                    <td>20</td>
                    <td>200</td>
                </tr>
                <tr>
                    <td>Black Pepper</td>
                    <td>10</td>
                    <td>600</td>
                </tr>
                <tr>
                    <td>Cumin</td>
                    <td>25</td>
                    <td>350</td>
                </tr>
            </tbody>
        </table>

        <a href="#" class="btn">Add New Spice</a>
    </main>

    <footer>
        © 2026 Hinkar Traders. All rights reserved.
    </footer>
</body>
</html>
